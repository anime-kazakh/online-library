{% extends "base.html" %}

{% block content %}
<div>
    <ul>
        {% for author in authors %}
        <li>
            {{ author.full_name }}
            <ul>
                <li>{{ author.bio|linebreaks|truncatechars:40 }}</li>
                <li>
                    <a href="{{ author.get_absolute_url }}">Читать дальше.</a>
                </li>
            </ul>
        </li>
        <hr/>
        {% endfor %}
    </ul>
</div>
{% endblock %}
