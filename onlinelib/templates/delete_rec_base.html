{% extends "base.html" %}
{% load static %}

{% block style %}
<link type="text/css" href="{% static 'css/delete_rec_base_style.css' %}" rel="stylesheet">
{% endblock style %}

{% block content %}
<div class="confirm-del-layout">
    <form method="POST">
        {% csrf_token %}
        <p>Вы уверены, что хотите удалить? "{{ object }}"?</p>
        {{ form }}
        <input type="submit" value="Подтвердить">
    </form>
</div>
{% endblock content %}
