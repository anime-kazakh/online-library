{% extends 'base.html' %}

{% block title %}
    {{ title }}
{% endblock title %}

{% block style %}
{% endblock style %}

{% block content %}
    <form method="POST" >
        {% csrf_token %}
        <div class="form-error" >{{ form.non_field_errors }}</div>
        {% for f in form %}
        <p><label class="form-label" for="{{ f.id_for_label }}">{{ f.label }}</label>{{ f }}</p>
        <div class="form-error" >{{ f.errors }}</div>
        {% endfor %}
        <button type="submit">Изменить</button>
    </form>
{% endblock content %}
