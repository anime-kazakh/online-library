{% extends 'base.html' %}

{% block title %}
    {{ title }}
{% endblock %}

{% block content %}
    <div class="auth">
        <h1 class="main-title">Сброс пароля</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-error" >{{ form.non_field_errors }}</div>
            {% for f in form %}
            <p><label class="form-label" for="{{ f.id_for_label }}">{{ f.label }}</label>{{ f }}</p>
            <div class="form-error" >{{ f.errors }}</div>
            {% endfor %}
            <p><button class="submit-button" type="submit">Сохранить</button></p>
        </form>
    </div>
{% endblock content %}
